# Create the workflows directory if it doesn't exist
mkdir -p .github/workflows

# Create a fresh workflow.yml
cat > .github/workflows/workflow.yml << 'EOF'
name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run linter
        run: npm run lint || echo "No lint script yet - OK"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run tests
        run: npm test || echo "No test script yet - OK"
EOF